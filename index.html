<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SZBMRTT - Hivatalos honlap</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    html { scroll-behavior: smooth; }
    
    /* Menüpont fókusz (lilásszürke) és interakciók */
    .menu-item:focus { background-color: #e2e8f0; outline: none; }
    .rotate-180 { transform: rotate(180deg); }
    .transition-transform { transition: transform 0.2s ease; }
    
    /* Trikolor stílus a bal felső sarokban */
    .trikolor {
      height: 4px;
      width: 60px;
      background: linear-gradient(to right, #ce1126 33.3%, #ffffff 33.3%, #ffffff 66.6%, #006847 66.6%);
      margin-bottom: 4px;
    }

    /* Almenü vezérlés */
    .submenu { 
      display: none; 
      max-height: none; 
      overflow: visible; 
    }
    .group:focus-within .submenu { display: block; }

    /* Navigációs szöveg sűrítése a vízszintes helykihasználásért */
    .nav-container {
      font-size: 0.875rem;
    }
  </style>
</head>
<body class="bg-white font-sans text-gray-900">
