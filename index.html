<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SzBMRTT - Hero Slideshow</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #f9f9f6;
    }

    /* Slideshow konténer (csak a kép) */
    .hero-slideshow {
      position: relative;
      width: 100%;
      overflow: hidden;
    }

    /* Asztali nézet: 1500:500 arány (3:1) */
    @media (min-width: 1024px) {
      .hero-slideshow {
        aspect-ratio: 1500 / 500;
      }
    }

    /* Mobil nézet: 1180:829 arány */
    @media (max-width: 1023px) {
      .hero-slideshow {
        aspect-ratio: 1180 / 829;
      }
    }

    .slides-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out;
    }

    .slide.active {
      opacity: 1;
      visibility: visible;
      z-index: 1;
    }

    /* Kép stílus */
    .slide picture,
    .slide img {
      display: block;
      width: 100%;
      height: 100%;
    }

    .slide img {
      object-fit: fill; /* a kép pont kitölti a konténert, nem torzít */
      object-position: center;
    }

    /* ========== ASZTALI NÉZET: szöveg a képen belül (bal fehér mezőben) ========== */
    @media (min-width: 1024px) {
      .desktop-text {
        position: absolute;
        top: 0;
        left: 0;
        width: 50%;          /* a bal oldali fehér mező */
        height: 100%;
        z-index: 2;
        pointer-events: none;
      }
      .desktop-motto {
        position: absolute;
        top: 30%;
        right: 20px;
        transform: translateY(-50%);
        text-align: right;
        opacity: 0; /* alapból láthatatlan, animáció teszi láthatóvá */
      }
      .desktop-desc {
        position: absolute;
        bottom: 30px;
        right: 20px;
        text-align: right;
        width: auto;
        background-color: rgba(0, 0, 0, 0.8);
        border-right: 4px solid #0082D1;
        padding: 12px 20px;
        border-radius: 0;
        opacity: 0;
      }
      .latin-motto {
        font-size: 24px;
        font-weight: bold;
        color: #000000;
        white-space: nowrap;
      }
      .hungarian-motto {
        font-size: 18px;
        font-weight: normal;
        color: #000000;
        white-space: nowrap;
      }
      .desc-text {
        font-size: 15px;
        font-weight: normal;
        color: #ffffff;
        opacity: 0.95;
        white-space: normal;
      }
      /* Animációk asztali szöveghez */
      .desktop-motto.animate {
        animation: slideInFromRight 0.6s ease-out forwards;
      }
      .desktop-desc.animate {
        animation: fadeIn 0.8s ease-out forwards;
      }
    }

    /* ========== MOBIL NÉZET: szöveg a kép ALATT ========== */
    @media (max-width: 1023px) {
      .mobile-text-container {
        background: linear-gradient(to right, rgba(0,0,0,0.85), rgba(0,0,0,0.6));
        padding: 15px 20px;
        margin-top: 0; /* közvetlenül a kép alá kerül */
      }
      .mobile-motto {
        text-align: left;
        margin-bottom: 10px;
      }
      .mobile-desc {
        text-align: left;
      }
      .mobile-text-container .latin-motto {
        font-size: 4vw;
        font-weight: bold;
        color: #ffffff;
        white-space: nowrap;
      }
      .mobile-text-container .hungarian-motto {
        font-size: 3vw;
        font-weight: normal;
        color: #ffffff;
        white-space: nowrap;
      }
      .mobile-text-container .desc-text {
        font-size: 11px;
        font-weight: normal;
        color: #ffffff;
        opacity: 0.9;
        white-space: normal;
      }
      /* Mobil animációk */
      .mobile-text-container.animate {
        animation: slideInFromRight 0.5s ease-out forwards;
      }
      .mobile-desc .desc-text.animate {
        animation: fadeIn 0.6s ease-out forwards;
      }
    }

    /* ========== KÖZÖS ANIMÁCIÓK ========== */
    @keyframes slideInFromRight {
      0% {
        opacity: 0;
        transform: translateX(50px);
      }
      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 0.95; }
    }

    /* Navigáció */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 10;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }
    .nav-btn:hover {
      background: rgba(0,0,0,0.8);
    }
    .prev { left: 20px; }
    .next { right: 20px; }

    .dots {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 12px;
      z-index: 10;
    }
    .dot {
      width: 10px;
      height: 10px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.3s;
    }
    .dot.active {
      background: white;
      transform: scale(1.2);
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
<div class="hero-slideshow">
  <div class="slides-container">
    <!-- dia-k: csak a képek -->
    <div class="slide" data-index="0">
      <picture>
        <source media="(max-width: 1023px)" srcset="szbmrtt-president-dr-jozsef-paradi-inauguration-1984-mobile.jpg">
        <img src="szbmrtt-elnok-dr-paradi-jozsef-szekfoglalo-rendortiszti-foiskola1984-desktop.jpg" alt="Dr. Parádi József székfoglaló">
      </picture>
    </div>
    <div class="slide" data-index="1">
      <picture>
        <source media="(max-width: 1023px)" srcset="national-security-service-conference-budapest-intelligence-mobile.jpg">
        <img src="szbmrtt-nbsz-nemzetbiztonsagi-szakszolgalat-szakmatorteneti-konferencia-desktop.jpg" alt="NBSZ konferencia">
      </picture>
    </div>
    <div class="slide" data-index="2">
      <picture>
        <source media="(max-width: 1023px)" srcset="intelligence-reconnaissance-service-manual-1872-guide-mobile.jpg">
        <img src="anleitung-zum-kundschaftsdienste-1872-felderitoszolgalati-utasitas-szbmrtt-desktop.jpg" alt="1872-es utasítás">
      </picture>
    </div>
    <div class="slide" data-index="3">
      <picture>
        <source media="(max-width: 1023px)" srcset="szbmrtt-honorary-medals-zeidler-sandor-design-mobile.jpg">
        <img src="szbmrtt-kituntetesek-zeidler-sandor-falerisztika-merit-awards-desktop.jpg" alt="Kitüntetések">
      </picture>
    </div>
  </div>

  <!-- ASZTALI SZÖVEG (a képen belül, bal oldali fehér mezőben) -->
  <div class="desktop-text">
    <div class="desktop-motto">
      <div class="latin-motto"></div>
      <div class="hungarian-motto"></div>
    </div>
    <div class="desktop-desc">
      <div class="desc-text"></div>
    </div>
  </div>

  <button class="nav-btn prev" aria-label="Előző">‹</button>
  <button class="nav-btn next" aria-label="Következő">›</button>
  <div class="dots"></div>
</div>

<!-- MOBIL SZÖVEG (a kép alatt) -->
<div class="mobile-text-container">
  <div class="mobile-motto">
    <div class="latin-motto"></div>
    <div class="hungarian-motto"></div>
  </div>
  <div class="mobile-desc">
    <div class="desc-text"></div>
  </div>
</div>

<script>
  (function() {
    // Dia adatok
    const slidesData = [
      {
        latin: "Cum historia pro securitate.",
        hungarian: "Történelemmel a biztonságért.",
        desc: "Társaságunk elnöke, dr. Parádi József székfoglalója a Rendőrtiszti Főiskolán 1984."
      },
      {
        latin: "Condita decrescit vulgata scientia crescit.",
        hungarian: "Az elrejtett tudás elsorvad, a másokkal megosztott gyarapszik.",
        desc: "Tudományos párbeszéd: Szemere Bertalan Magyar Rendvédelem-történeti Tudományos Társaság – Nemzetbiztonsági Szakszolgálat szakmatörténeti konferencia."
      },
      {
        latin: "Veritas nunquam perit.",
        hungarian: "Az igazság sosem vész el.",
        desc: "Dr. Parádi József és dr. Sándor Vilmos † az 1872-es Felderítőszolgálati utasítás (Anleitung zum Kundschaftsdienste) c. háromnyelvű társasági kiadványunk könyvbemutatóján."
      },
      {
        latin: "Honos honestum decorat, inhonestum notat.",
        hungarian: "A kitüntetés a méltót ékesíti, a méltatlant bélyegezi.",
        desc: "Érdem és elismerés. Társaságunk mag. Zeidler Sándor által tervezett kitüntetései."
      }
    ];

    const slides = document.querySelectorAll('.slide');
    const prevBtn = document.querySelector('.prev');
    const nextBtn = document.querySelector('.next');
    const dotsContainer = document.querySelector('.dots');
    let currentIndex = 0;
    let interval;
    const intervalTime = 8000;

    // Asztali szövegelemek
    const desktopMotto = document.querySelector('.desktop-motto');
    const desktopDesc = document.querySelector('.desktop-desc');
    const desktopLatin = document.querySelector('.desktop-motto .latin-motto');
    const desktopHungarian = document.querySelector('.desktop-motto .hungarian-motto');
    const desktopDescText = document.querySelector('.desktop-desc .desc-text');

    // Mobil szövegelemek
    const mobileContainer = document.querySelector('.mobile-text-container');
    const mobileLatin = document.querySelector('.mobile-motto .latin-motto');
    const mobileHungarian = document.querySelector('.mobile-motto .hungarian-motto');
    const mobileDescText = document.querySelector('.mobile-desc .desc-text');

    // Szöveg frissítése és animációk indítása
    function updateText(index) {
      const data = slidesData[index];

      // Asztali szöveg frissítése
      if (desktopLatin) desktopLatin.textContent = data.latin;
      if (desktopHungarian) desktopHungarian.textContent = data.hungarian;
      if (desktopDescText) desktopDescText.textContent = data.desc;

      // Asztali animációk újraindítása
      if (desktopMotto) {
        desktopMotto.classList.remove('animate');
        desktopDesc.classList.remove('animate');
        // Kényszerített reflow
        void desktopMotto.offsetWidth;
        void desktopDesc.offsetWidth;
        desktopMotto.classList.add('animate');
        desktopDesc.classList.add('animate');
      }

      // Mobil szöveg frissítése
      if (mobileLatin) mobileLatin.textContent = data.latin;
      if (mobileHungarian) mobileHungarian.textContent = data.hungarian;
      if (mobileDescText) mobileDescText.textContent = data.desc;

      // Mobil animációk újraindítása
      if (mobileContainer) {
        mobileContainer.classList.remove('animate');
        void mobileContainer.offsetWidth;
        mobileContainer.classList.add('animate');
      }
      // Mobil leírás fade animáció
      if (mobileDescText) {
        mobileDescText.classList.remove('animate');
        void mobileDescText.offsetWidth;
        mobileDescText.classList.add('animate');
      }
    }

    // Dots-ok létrehozása
    function createDots() {
      dotsContainer.innerHTML = '';
      slides.forEach((_, idx) => {
        const dot = document.createElement('div');
        dot.classList.add('dot');
        if (idx === currentIndex) dot.classList.add('active');
        dot.addEventListener('click', () => goToSlide(idx));
        dotsContainer.appendChild(dot);
      });
    }

    function updateDots() {
      const dots = document.querySelectorAll('.dot');
      dots.forEach((dot, idx) => {
        if (idx === currentIndex) dot.classList.add('active');
        else dot.classList.remove('active');
      });
    }

    function goToSlide(index) {
      if (index < 0) index = slides.length - 1;
      if (index >= slides.length) index = 0;
      slides.forEach(slide => slide.classList.remove('active'));
      slides[index].classList.add('active');
      currentIndex = index;
      updateDots();
      updateText(currentIndex);
      resetInterval();
    }

    function nextSlide() { goToSlide(currentIndex + 1); }
    function prevSlide() { goToSlide(currentIndex - 1); }
    function resetInterval() {
      if (interval) clearInterval(interval);
      interval = setInterval(nextSlide, intervalTime);
    }

    // Eseménykezelők
    prevBtn.addEventListener('click', () => { prevSlide(); resetInterval(); });
    nextBtn.addEventListener('click', () => { nextSlide(); resetInterval(); });

    // Inicializálás
    slides[0].classList.add('active');
    createDots();
    updateText(0);
    resetInterval();
  })();
</script>
</body>
</html>
